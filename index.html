<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Букетный Tinder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a0b2e 0%, #2d1a45 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Контейнер */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px 0;
        }

        /* Заголовок */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 50px 20px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(26,11,46,0.95) 0%, transparent 100%);
            z-index: 5;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        /* Счётчик */
        .counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 700;
            font-size: 14px;
            z-index: 20;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        /* Стек карточек */
        .cards-stack {
            position: relative;
            width: 310px;
            height: 460px;
            margin: 60px auto 20px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            cursor: grab;
            will-change: transform;
            background: #fff;
            transition: box-shadow 0.2s;
        }

        .card:active {
            cursor: grabbing;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 25px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            color: white;
        }

        .card-overlay h3 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .card-overlay p {
            font-size: 13px;
            opacity: 0.85;
        }

        .badge {
            position: absolute;
            top: 30px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: #FFD966;
        }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 35px;
            margin-top: 15px;
            z-index: 10;
        }

        .action-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: rgba(255,255,255,0.96);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .btn-nope {
            color: #ff6b6b;
        }

        .btn-like {
            color: #51cf66;
        }

        /* ЭКРАН РЕЗУЛЬТАТОВ — СТАТИСТИКА */
        .results-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #0f0b1e 0%, #1e1733 100%);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-y: auto;
            animation: fadeSlideUp 0.4s ease-out;
        }

        .results-modal.active {
            display: flex;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 28px 22px;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .results-card h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .winner-gold {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50px;
            padding: 18px;
            text-align: center;
            margin-bottom: 24px;
            color: #2a1a3a;
        }

        .winner-gold span {
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .winner-gold h3 {
            font-size: 28px;
            margin-top: 6px;
            font-weight: 800;
        }

        .winner-gold .votes-count {
            font-size: 20px;
            font-weight: 700;
            margin-top: 6px;
        }

        .results-list {
            max-height: 260px;
            overflow-y: auto;
            margin: 16px 0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.08);
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
        }

        .result-item.user-winner {
            background: rgba(255,215,0,0.2);
            border-left: 4px solid #FFD700;
        }

        .global-stats {
            background: rgba(0,0,0,0.45);
            border-radius: 32px;
            padding: 14px;
            margin: 16px 0;
            text-align: center;
            font-size: 13px;
            color: #ddd;
        }

        .restart-btn {
            background: #FFD966;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            color: #2a1a3a;
            transition: 0.2s;
        }

        .restart-btn:active {
            transform: scale(0.97);
        }

        .close-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Стилизация скролла */
        .results-list::-webkit-scrollbar {
            width: 4px;
        }
        .results-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .results-list::-webkit-scrollbar-thumb {
            background: #FFD966;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🌸 БУКЕТНЫЙ КОНКУРС</h1>
            <p>Свайп вправо ❤️ — голосуй за букет</p>
        </div>
        <div class="counter" id="counter">0 / 15</div>
        <div class="cards-stack" id="cardsStack"></div>
        <div class="action-buttons">
            <button class="action-btn btn-nope" id="nopeBtn">❌</button>
            <button class="action-btn btn-like" id="likeBtn">❤️</button>
        </div>
    </div>

    <div class="results-modal" id="resultsModal">
        <div class="results-card">
            <h2>🏆 РЕЗУЛЬТАТЫ 🏆</h2>
            <div id="winnerBlock" class="winner-gold"></div>
            <div id="resultsList" class="results-list"></div>
            <div id="globalStats" class="global-stats">📊 Загрузка статистики...</div>
            <button class="restart-btn" id="restartAppBtn">🔁 ПРОЙТИ ЗАНОВО</button>
            <button class="restart-btn close-btn" id="closeAppBtn">✖️ ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.MainButton.hide();

        // ==================== ВАШИ ДАННЫЕ ====================
        const STATS_BOT_TOKEN = "8920323671:AAES9xUjSGgfCqrjbd2bL8Jf0lXffP332KA";
        const ADMIN_ID = 8638747370;
        
        const BOUQUETS = [
            { id: 1, name: "Розовое совершенство", image: "https://i.ibb.co/HLTDRmhV/2dc5d09c-e2b8-450c-b05f-c86cc1bb0136.jpg", votes: 0 },
            { id: 2, name: "Лавандовый сон", image: "https://i.ibb.co/ccwBj5qv/4c7ae421-7d41-4879-9fdf-2a5a1cfc1196.jpg", votes: 0 },
            { id: 3, name: "Солнечный свет", image: "https://i.ibb.co/zTZCY8mT/55fa197f-89ca-4552-aa6f-32f3a5b39eea.jpg", votes: 0 },
            { id: 4, name: "Бархатный вечер", image: "https://i.ibb.co/jPL3TDr8/4519e87c-707a-4452-ba20-1789f8b85614.jpg", votes: 0 },
            { id: 5, name: "Нежный шёпот", image: "https://i.ibb.co/wF2KVkbF/6132869b-20f7-402b-88c9-4f7074eae2d4.jpg", votes: 0 },
            { id: 6, name: "Королевский букет", image: "https://i.ibb.co/27HFvjTC/bce82e6b-b8fe-45da-a98c-cc6178fc1623.jpg", votes: 0 },
            { id: 7, name: "Весенняя свежесть", image: "https://i.ibb.co/v6QJ6kxv/bee98276-4fd2-419b-9c28-eb080f02d140.jpg", votes: 0 },
            { id: 8, name: "Романтика", image: "https://i.ibb.co/G33g8ZJ4/c6d4fddb-baff-4102-8c62-f37bc983a6dc.jpg", votes: 0 },
            { id: 9, name: "Яркая фантазия", image: "https://i.ibb.co/B5rTdGnP/cbba81b1-1727-45a0-a7f2-108155b696dd.jpg", votes: 0 },
            { id: 10, name: "Жемчужный", image: "https://i.ibb.co/QFmT1QVZ/d2c053ed-3814-4125-9d3c-034b330a58f9.jpg", votes: 0 },
            { id: 11, name: "Магия цветов", image: "https://i.ibb.co/5WDs3SdY/e76f095c-ac47-4d12-8f29-e495cff6e8d4.jpg", votes: 0 },
            { id: 12, name: "Изумрудный", image: "https://i.ibb.co/Sw38zVqM/ecc9b085-2fb0-4449-af33-b741129f6f7f.jpg", votes: 0 },
            { id: 13, name: "Перламутровый", image: "https://i.ibb.co/3mVW0JVB/f4b16846-ddd0-4a5a-8340-dbd8dc7ca036.jpg", votes: 0 },
            { id: 14, name: "Сияние", image: "https://i.ibb.co/wr25z3Lp/f9a860fb-8f79-458c-8666-e43f90b79301.jpg", votes: 0 },
            { id: 15, name: "Вдохновение", image: "https://i.ibb.co/MDN4z59r/f89a9882-d917-4c31-b9c7-d40272a1b833.jpg", votes: 0 }
        ];

        let shuffled = [...BOUQUETS].sort(() => Math.random() - 0.5);
        let currentIndex = 0;
        let isAnimating = false;
        let currentCard = null;
        let globalStatsCache = [];

        // Функция отправки данных боту №2
        async function sendToStatsBot(winnerName, votesArray) {
            const userId = tg.initDataUnsafe?.user?.id;
            const userName = tg.initDataUnsafe?.user?.username || "Гость";
            
            const payload = {
                winner: winnerName,
                votes: votesArray,
                user_id: userId,
                username: userName,
                timestamp: Date.now()
            };
            
            const url = `https://api.telegram.org/bot${STATS_BOT_TOKEN}/sendMessage`;
            
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: JSON.stringify(payload)
                    })
                });
                console.log("✅ Данные отправлены администратору");
            } catch(e) {
                console.log("❌ Ошибка отправки:", e);
            }
        }

        // Сохранение в localStorage глобальной статистики
        function saveToLocalStorage(votesData) {
            let all = JSON.parse(localStorage.getItem("bouquet_global_votes") || "[]");
            const userId = tg.initDataUnsafe?.user?.id || "anon";
            const existingIndex = all.findIndex(v => v.userId === userId);
            
            const newEntry = {
                userId: userId,
                userName: tg.initDataUnsafe?.user?.username || "Гость",
                votes: votesData,
                date: Date.now()
            };
            
            if (existingIndex !== -1) {
                all[existingIndex] = newEntry;
            } else {
                all.push(newEntry);
            }
            
            localStorage.setItem("bouquet_global_votes", JSON.stringify(all));
        }

        function getGlobalStats() {
            const all = JSON.parse(localStorage.getItem("bouquet_global_votes") || "[]");
            const total = {};
            BOUQUETS.forEach(b => total[b.name] = 0);
            
            all.forEach(user => {
                user.votes.forEach(v => {
                    total[v.name] = (total[v.name] || 0) + v.votes;
                });
            });
            
            return Object.entries(total)
                .map(([name, votes]) => ({ name, votes }))
                .sort((a, b) => b.votes - a.votes);
        }

        function showResults() {
            const winner = shuffled.reduce((a, b) => a.votes > b.votes ? a : b);
            const votesData = shuffled.map(b => ({ name: b.name, votes: b.votes }));
            
            saveToLocalStorage(votesData);
            sendToStatsBot(winner.name, votesData);
            
            const globalStats = getGlobalStats();
            const totalUsers = JSON.parse(localStorage.getItem("bouquet_global_votes") || "[]").length;
            const totalVotes = globalStats.reduce((sum, b) => sum + b.votes, 0);
            
            // Победитель
            document.getElementById("winnerBlock").innerHTML = `
                <span>🏆 ПОБЕДИТЕЛЬ КОНКУРСА 🏆</span>
                <h3>✨ ${winner.name} ✨</h3>
                <div class="votes-count">${winner.votes} голосов</div>
            `;
            
            // Результаты пользователя
            let resultsHtml = `<div style="margin-bottom:12px; padding-left:8px;">📋 ВАШИ ГОЛОСА:</div>`;
            shuffled.forEach(b => {
                const isUserWinner = b.name === winner.name;
                resultsHtml += `
                    <div class="result-item ${isUserWinner ? 'user-winner' : ''}">
                        <span>${b.name}</span>
                        <span style="background:rgba(0,0,0,0.4); padding:4px 12px; border-radius:30px;">${b.votes} гол.</span>
                    </div>
                `;
            });
            
            // Глобальная статистика
            let globalHtml = `<span style="font-weight:700;">🌍 ОБЩАЯ СТАТИСТИКА</span><br>`;
            globalHtml += `👥 Участников: ${totalUsers} | 🗳️ Голосов: ${totalVotes}<br><br>`;
            globalStats.slice(0, 5).forEach((b, idx) => {
                const medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `${idx+1}.`;
                globalHtml += `${medal} ${b.name} — ${b.votes} гол.<br>`;
            });
            
            document.getElementById("resultsList").innerHTML = resultsHtml;
            document.getElementById("globalStats").innerHTML = globalHtml;
            document.getElementById("resultsModal").classList.add("active");
        }

        // Свайп-логика
        function createCard(flower) {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${flower.image}" alt="${flower.name}" onerror="this.src='https://via.placeholder.com/400x500/ccc?text=Фото'">
                <div class="badge">#${flower.id}</div>
                <div class="card-overlay">
                    <h3>${flower.name}</h3>
                    <p>👆 Свайпни вправо, чтобы проголосовать</p>
                </div>
            `;
            return card;
        }

        function attachDragEvents(card) {
            let startX = 0;
            let isDragging = false;
            
            const onStart = (e) => {
                if (isAnimating) return;
                isDragging = true;
                startX = e.clientX ?? e.touches[0].clientX;
                card.style.transition = "none";
            };
            
            const onMove = (e) => {
                if (!isDragging || isAnimating) return;
                e.preventDefault();
                const currentX = e.clientX ?? e.touches[0].clientX;
                const deltaX = currentX - startX;
                card.style.transform = `translate(${deltaX}px, 0px) rotate(${deltaX * 0.1}deg)`;
                
                if (deltaX > 50) card.style.boxShadow = "0 0 25px rgba(81,207,102,0.7)";
                else if (deltaX < -50) card.style.boxShadow = "0 0 25px rgba(255,107,107,0.7)";
                else card.style.boxShadow = "0 25px 45px rgba(0,0,0,0.4)";
            };
            
            const onEnd = (e) => {
                if (!isDragging || isAnimating) return;
                isDragging = false;
                const endX = e.clientX ?? e.changedTouches[0].clientX;
                const deltaX = endX - startX;
                
                if (Math.abs(deltaX) > 80) {
                    const direction = deltaX > 0 ? "right" : "left";
                    finishSwipe(card, direction);
                } else {
                    card.style.transition = "transform 0.25s";
                    card.style.transform = "translate(0,0) rotate(0)";
                    card.style.boxShadow = "0 25px 45px rgba(0,0,0,0.4)";
                    setTimeout(() => card.style.transition = "", 250);
                }
            };
            
            card.addEventListener("mousedown", onStart);
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onEnd);
            card.addEventListener("touchstart", onStart);
            window.addEventListener("touchmove", onMove);
            window.addEventListener("touchend", onEnd);
        }

        function finishSwipe(card, direction) {
            isAnimating = true;
            const targetX = direction === "right" ? 550 : -550;
            const rotation = direction === "right" ? 25 : -25;
            
            card.style.transition = "transform 0.3s cubic-bezier(0.3, 0.9, 0.5, 1.1)";
            card.style.transform = `translate(${targetX}px, 120px) rotate(${rotation}deg)`;
            
            if (direction === "right") {
                shuffled[currentIndex].votes++;
            }
            
            setTimeout(() => {
                card.remove();
                currentIndex++;
                if (currentIndex >= shuffled.length) {
                    showResults();
                } else {
                    loadNextCard();
                }
                isAnimating = false;
            }, 280);
        }

        function loadNextCard() {
            const container = document.getElementById("cardsStack");
            const flower = shuffled[currentIndex];
            const card = createCard(flower);
            container.appendChild(card);
            currentCard = card;
            attachDragEvents(card);
            document.getElementById("counter").innerHTML = `${currentIndex + 1} / ${shuffled.length}`;
        }

        function swipeButton(direction) {
            if (!currentCard || isAnimating) return;
            finishSwipe(currentCard, direction);
        }

        // Инициализация
        document.getElementById("likeBtn").onclick = () => swipeButton("right");
        document.getElementById("nopeBtn").onclick = () => swipeButton("left");
        document.getElementById("restartAppBtn").onclick = () => location.reload();
        document.getElementById("closeAppBtn").onclick = () => tg.close();

        loadNextCard();
    </script>
</body>
</html>
