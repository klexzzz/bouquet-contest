    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            width: 100%;

            height: 100vh;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);

            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            cursor: grab;
            will-change: transform;
            background: white;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
        }
        .card-info h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .buttons {
            display: flex;
            gap: 35px;
            margin-top: 20px;
            z-index: 10;
        }
        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 36px;
            cursor: pointer;
            transition: transform 0.2s;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:active {
            transform: scale(0.93);
        }
        .btn-left { color: #ff6b6b; }
        .btn-right { color: #51cf66; }
        .results-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #1e1a2f, #2d2440);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .results-screen.active {
            display: flex;
        }
        .results-card {
            background: rgba(255,255,255,0.1);

        .results-card h2 {

            border-radius: 40px;
            padding: 15px;

<html lang="ru">
<head>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Конкурс букетов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        .card-info h3 { font-size: 24px; margin-bottom: 5px; }
        .buttons { display: flex; gap: 35px; margin-top: 20px; z-index: 10; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 36px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.95); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.93); }
        .btn-left { color: #ff6b6b; }
        .btn-right { color: #51cf66; }
        
        /* ЭКРАН РЕЗУЛЬТАТОВ — НЕ ИСЧЕЗАЕТ */
        .results-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(145deg, #1e1a2f, #2d2440); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .results-screen.active { display: flex; }
        .results-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 40px; padding: 25px; width: 100%; max-width: 350px; }
        .results-card h2 { color: #FFD966; text-align: center; margin-bottom: 20px; }
        .winner-badge { background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 40px; padding: 15px; text-align: center; margin-bottom: 20px; color: #1e1a2f; }
        .winner-badge h3 { font-size: 28px; }
        .results-list { max-height: 250px; overflow-y: auto; margin: 15px 0; }
        .result-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.1); margin: 6px 0; padding: 10px 14px; border-radius: 40px; color: white; }
        .restart-btn { background: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="counter" id="counter">0 / 15</div>
        <div class="cards-container" id="cardsContainer"></div>
        <div class="buttons">
            <button class="btn btn-left" id="leftBtn">❌</button>
            <button class="btn btn-right" id="rightBtn">❤️</button>
        </div>
    </div>
    <div class="results-screen" id="resultsScreen">
        <div class="results-card">
            <h2>🏆 ИТОГИ 🏆</h2>
            <div id="winnerBlock" class="winner-badge"></div>
            <div id="resultsList" class="results-list"></div>
            <button class="restart-btn" id="restartBtn">🔁 ПРОЙТИ ЗАНОВО</button>
            <button class="restart-btn" id="closeBtn" style="background:#ff6b6b; color:white;">✖️ ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // ============================================
        // 🔴🔴🔴 ТОКЕН ВТОРОГО БОТА (ОБЯЗАТЕЛЬНО) 🔴🔴🔴
        // ============================================
        const STATS_BOT_TOKEN = "8920323671:AAES9xUjSGgfCqrjbd2bL8Jf0lXffP332KA";
        
        // ============================================
        // 🔴🔴🔴 ВАШИ 15 ССЫЛОК НА ФОТО 🔴🔴🔴
        // ============================================
        const bouquets = [
            { id: 1, name: "Романтический", image: "https://i.ibb.co/HLTDRmhV/2dc5d09c-e2b8-450c-b05f-c86cc1bb0136.jpg", votes: 0 },
            { id: 2, name: "Весенний", image: "https://i.ibb.co/ccwBj5qv/4c7ae421-7d41-4879-9fdf-2a5a1cfc1196.jpg", votes: 0 },
            { id: 3, name: "Роскошный", image: "https://i.ibb.co/zTZCY8mT/55fa197f-89ca-4552-aa6f-32f3a5b39eea.jpg", votes: 0 },
            { id: 4, name: "Нежный", image: "https://i.ibb.co/jPL3TDr8/4519e87c-707a-4452-ba20-1789f8b85614.jpg", votes: 0 },
            { id: 5, name: "Свадебный", image: "https://i.ibb.co/wF2KVkbF/6132869b-20f7-402b-88c9-4f7074eae2d4.jpg", votes: 0 },
            { id: 6, name: "Яркий", image: "https://i.ibb.co/27HFvjTC/bce82e6b-b8fe-45da-a98c-cc6178fc1623.jpg", votes: 0 },
            { id: 7, name: "Классика", image: "https://i.ibb.co/v6QJ6kxv/bee98276-4fd2-419b-9c28-eb080f02d140.jpg", votes: 0 },
            { id: 8, name: "Полевой", image: "https://i.ibb.co/G33g8ZJ4/c6d4fddb-baff-4102-8c62-f37bc983a6dc.jpg", votes: 0 },
            { id: 9, name: "Экзотика", image: "https://i.ibb.co/B5rTdGnP/cbba81b1-1727-45a0-a7f2-108155b696dd.jpg", votes: 0 },
            { id: 10, name: "Бархатный", image: "https://i.ibb.co/QFmT1QVZ/d2c053ed-3814-4125-9d3c-034b330a58f9.jpg", votes: 0 },
            { id: 11, name: "Королевский", image: "https://i.ibb.co/5WDs3SdY/e76f095c-ac47-4d12-8f29-e495cff6e8d4.jpg", votes: 0 },
            { id: 12, name: "Лаванда", image: "https://i.ibb.co/Sw38zVqM/ecc9b085-2fb0-4449-af33-b741129f6f7f.jpg", votes: 0 },
            { id: 13, name: "Малиновый", image: "https://i.ibb.co/3mVW0JVB/f4b16846-ddd0-4a5a-8340-dbd8dc7ca036.jpg", votes: 0 },
            { id: 14, name: "Элегантный", image: "https://i.ibb.co/wr25z3Lp/f9a860fb-8f79-458c-8666-e43f90b79301.jpg", votes: 0 },
            { id: 15, name: "Фантазия", image: "https://i.ibb.co/MDN4z59r/f89a9882-d917-4c31-b9c7-d40272a1b833.jpg", votes: 0 }
        ];

        let shuffled = [...bouquets].sort(() => Math.random() - 0.5);
        let current = 0;
        let anim = false;
        let currentCard = null;

        // ============================================
        // ОТПРАВКА ДАННЫХ В БОТА №2
        // ============================================
        async function sendToStatsBot(winnerName, votesArray, userId, userName) {
            if (STATS_BOT_TOKEN.includes("7167517213") && STATS_BOT_TOKEN.length > 30) {
                const messageText = JSON.stringify({
                    winner: winnerName,
                    votes: votesArray,
                    user_id: userId,
                    username: userName
                });
                
                const url = `https://api.telegram.org/bot${STATS_BOT_TOKEN}/sendMessage`;
                const payload = {
                    chat_id: userId,
                    text: messageText
                };
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.ok) {
                        console.log("✅ Данные отправлены боту №2");
                    } else {
                        console.log("❌ Ошибка:", result);
                    }
                } catch (error) {
                    console.log("❌ Ошибка сети:", error);
                }
            } else {
                console.log("⚠️ Токен не настроен");
            }
        }

        function showResults() {
            let winner = shuffled.reduce((a,b) => a.votes > b.votes ? a : b);
            let votesData = shuffled.map(b => ({ name: b.name, votes: b.votes }));
            
            const userId = tg.initDataUnsafe?.user?.id;
            const userName = tg.initDataUnsafe?.user?.username || "Гость";
            
            // Отправляем данные боту №2
            sendToStatsBot(winner.name, votesData, userId, userName);
            
            // Показываем результаты (НЕ ИСЧЕЗАЮТ!)
            document.getElementById("winnerBlock").innerHTML = `
                <span>🏅 ПОБЕДИТЕЛЬ</span>
                <h3>✨ ${winner.name} ✨</h3>
                <div style="font-size:22px;">${winner.votes} голосов</div>
            `;
            
            let listHtml = `<div style="margin:8px 0 8px 8px; color:#FFD966;">📋 ВАШИ ГОЛОСА:</div>`;
            shuffled.forEach(b => {
                listHtml += `<div class="result-row"><span>${b.name}</span><span>${b.votes} гол.</span></div>`;
            });
            document.getElementById("resultsList").innerHTML = listHtml;
            document.getElementById("resultsScreen").classList.add("active");
        }

        // ОСТАЛЬНОЙ КОД СВАЙПОВ (РАБОЧИЙ)
        function createCard(b) {
            let div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<img src="${b.image}" onerror="this.src='https://placehold.co/400x500?text=Фото'"><div class="card-info"><h3>${b.name}</h3><p>👉 Свайп вправо — голос</p></div>`;
            return div;
        }

        function attachEvents(card) {
            let startX = 0, drag = false;
            const onStart = (e) => {
                if (anim) return;
                drag = true;
                startX = e.clientX ?? e.touches[0].clientX;
                card.style.transition = "none";
            };
            const onMove = (e) => {
                if (!drag || anim) return;
                e.preventDefault();
                let dx = (e.clientX ?? e.touches[0].clientX) - startX;
                card.style.transform = `translate(${dx}px, 0px) rotate(${dx*0.1}deg)`;
            };
            const onEnd = (e) => {
                if (!drag || anim) return;
                drag = false;
                let dx = (e.clientX ?? e.changedTouches[0].clientX) - startX;
                if (Math.abs(dx) > 80) {
                    anim = true;
                    let dir = dx > 0 ? "right" : "left";
                    if (dir === "right") shuffled[current].votes++;
                    card.style.transition = "transform 0.25s";
                    card.style.transform = `translate(${dir === "right" ? 500 : -500}px, 80px) rotate(${dir === "right" ? 25 : -25}deg)`;
                    setTimeout(() => {
                        card.remove();
                        current++;
                        if (current >= shuffled.length) showResults();
                        else loadCard();
                        anim = false;
                    }, 250);
                } else {
                    card.style.transition = "transform 0.2s";
                    card.style.transform = "translate(0,0) rotate(0)";
                    setTimeout(() => card.style.transition = "", 200);
                }
            };
            card.addEventListener("mousedown", onStart);
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onEnd);
            card.addEventListener("touchstart", onStart);
            window.addEventListener("touchmove", onMove);
            window.addEventListener("touchend", onEnd);
        }

        function loadCard() {
            let card = createCard(shuffled[current]);
            document.getElementById("cardsContainer").appendChild(card);
            currentCard = card;
            attachEvents(card);
            document.getElementById("counter").innerText = `${current+1} / ${shuffled.length}`;
        }

        document.getElementById("leftBtn").onclick = () => { if(currentCard && !anim) { anim=true; let card=currentCard; card.style.transition="transform 0.25s"; card.style.transform="translate(-500px, 80px) rotate(-25deg)"; setTimeout(()=>{ card.remove(); current++; if(current>=shuffled.length) showResults(); else loadCard(); anim=false; },250); } };
        document.getElementById("rightBtn").onclick = () => { if(currentCard && !anim) { shuffled[current].votes++; anim=true; let card=currentCard; card.style.transition="transform 0.25s"; card.style.transform="translate(500px, 80px) rotate(25deg)"; setTimeout(()=>{ card.remove(); current++; if(current>=shuffled.length) showResults(); else loadCard(); anim=false; },250); } };
        document.getElementById("restartBtn").onclick = () => location.reload();
        document.getElementById("closeBtn").onclick = () => tg.close();

        loadCard();
    </script>
</body>
</html>
