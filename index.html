<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Букетный конкурс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Счётчик */
        .counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            z-index: 10;
            font-family: monospace;
        }

        /* Контейнер карточек */
        .cards-container {
            position: relative;
            width: 320px;
            height: 480px;
            margin: 20px auto;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            cursor: grab;
            will-change: transform;
            background: white;
            transition: box-shadow 0.2s;
        }

        .card:active {
            cursor: grabbing;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            color: white;
        }

        .card-info h3 {
            font-size: 24px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .card-info p {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 35px;
            margin-top: 20px;
            z-index: 10;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            font-size: 36px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.95);
        }

        .btn:active {
            transform: scale(0.93);
        }

        .btn-left {
            color: #ff6b6b;
        }

        .btn-right {
            color: #51cf66;
        }

        /* ЭКРАН РЕЗУЛЬТАТОВ */
        .results-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #1e1a2f 0%, #2d2440 100%);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            animation: fadeIn 0.4s ease;
        }

        .results-screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .results-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .results-screen h2 {
            color: #FFD966;
            font-size: 32px;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .winner-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 60px;
            padding: 18px;
            text-align: center;
            margin-bottom: 25px;
            color: #2c1a3a;
        }

        .winner-badge span {
            font-size: 14px;
            letter-spacing: 2px;
        }

        .winner-badge h3 {
            font-size: 28px;
            margin-top: 5px;
        }

        .results-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 8px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.15);
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
        }

        .result-row.winner-row {
            background: rgba(255,215,0,0.3);
            border-left: 5px solid gold;
        }

        .global-stats {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
        }

        .restart-btn {
            background: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            width: 90%;
            cursor: pointer;
            transition: 0.2s;
            color: #2d2440;
        }

        .restart-btn:active {
            transform: scale(0.97);
        }

        .close-telegram {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="counter" id="counter">0 / 15</div>
        <div class="cards-container" id="cardsContainer"></div>
        <div class="buttons">
            <button class="btn btn-left" id="leftBtn">❌</button>
            <button class="btn btn-right" id="rightBtn">❤️</button>
        </div>
    </div>

    <div class="results-screen" id="resultsScreen">
        <div class="results-card">
            <h2>🏆 ИТОГИ 🏆</h2>
            <div id="winnerBlock" class="winner-badge"></div>
            <div id="resultsList" class="results-list"></div>
            <div id="globalStats" class="global-stats"></div>
            <button class="restart-btn" id="restartBtn">🔁 ПРОЙТИ ЗАНОВО</button>
            <button class="restart-btn close-telegram" id="closeBtn">✖️ ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // ===== 1. ВСТАВЬТЕ ВАШИ 15 ССЫЛОК НА ФОТО =====
        const bouquets = [
            { id: 1, name: "Романтический", image: "https://i.ibb.co/HLTDRmhV/2dc5d09c-e2b8-450c-b05f-c86cc1bb0136.jpg", votes: 0 },
            { id: 2, name: "Весенний", image: "https://i.ibb.co/ccwBj5qv/4c7ae421-7d41-4879-9fdf-2a5a1cfc1196.jpg", votes: 0 },
            { id: 3, name: "Роскошный", image: "https://i.ibb.co/zTZCY8mT/55fa197f-89ca-4552-aa6f-32f3a5b39eea.jpg", votes: 0 },
            { id: 4, name: "Нежный", image: "https://i.ibb.co/jPL3TDr8/4519e87c-707a-4452-ba20-1789f8b85614.jpg", votes: 0 },
            { id: 5, name: "Свадебный", image: "https://i.ibb.co/wF2KVkbF/6132869b-20f7-402b-88c9-4f7074eae2d4.jpg", votes: 0 },
            { id: 6, name: "Яркий", image: "https://i.ibb.co/27HFvjTC/bce82e6b-b8fe-45da-a98c-cc6178fc1623.jpg", votes: 0 },
            { id: 7, name: "Классика", image: "https://i.ibb.co/v6QJ6kxv/bee98276-4fd2-419b-9c28-eb080f02d140.jpg", votes: 0 },
            { id: 8, name: "Полевой", image: "https://i.ibb.co/G33g8ZJ4/c6d4fddb-baff-4102-8c62-f37bc983a6dc.jpg", votes: 0 },
            { id: 9, name: "Экзотика", image: "https://i.ibb.co/B5rTdGnP/cbba81b1-1727-45a0-a7f2-108155b696dd.jpg", votes: 0 },
            { id: 10, name: "Бархатный", image: "https://i.ibb.co/QFmT1QVZ/d2c053ed-3814-4125-9d3c-034b330a58f9.jpg", votes: 0 },
            { id: 11, name: "Королевский", image: "https://i.ibb.co/5WDs3SdY/e76f095c-ac47-4d12-8f29-e495cff6e8d4.jpg", votes: 0 },
            { id: 12, name: "Лаванда", image: "https://i.ibb.co/Sw38zVqM/ecc9b085-2fb0-4449-af33-b741129f6f7f.jpg", votes: 0 },
            { id: 13, name: "Малиновый", image: "https://i.ibb.co/3mVW0JVB/f4b16846-ddd0-4a5a-8340-dbd8dc7ca036.jpg", votes: 0 },
            { id: 14, name: "Элегантный", image: "https://i.ibb.co/wr25z3Lp/f9a860fb-8f79-458c-8666-e43f90b79301.jpg", votes: 0 },
            { id: 15, name: "Фантазия", image: "https://i.ibb.co/MDN4z59r/f89a9882-d917-4c31-b9c7-d40272a1b833.jpg", votes: 0 }
        ];

        // ===== 2. ВАШ TELEGRAM ID ДЛЯ ПОЛУЧЕНИЯ ОБЩЕЙ СТАТИСТИКИ =====
        const YOUR_TELEGRAM_ID = "8638747370";   // УЗНАТЬ: @userinfobot

        // ===== ВСЁ ОСТАЛЬНОЕ РАБОТАЕТ АВТОМАТИЧЕСКИ =====
        
        let shuffledBouquets = [...bouquets].sort(() => Math.random() - 0.5);
        let currentIndex = 0;
        let isAnimating = false;
        let currentCard = null;
        let userId = tg.initDataUnsafe?.user?.id || "anon_" + Date.now();
        let userName = tg.initDataUnsafe?.user?.username || "Гость";

        function updateCounter() {
            document.getElementById('counter').innerHTML = `${currentIndex} / ${shuffledBouquets.length}`;
        }

        function createCard(bouquet) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${bouquet.image}" alt="${bouquet.name}" onerror="this.src='https://via.placeholder.com/400x500/cccccc/666?text=Фото+не+загрузилось'">
                <div class="card-info">
                    <h3>${bouquet.name}</h3>
                    <p>👆 Свайп вправо — голосую</p>
                </div>
            `;
            return card;
        }

        function attachCardEvents(card) {
            let startX = 0, isDragging = false;
            const onStart = (e) => {
                if (isAnimating) return;
                isDragging = true;
                const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : null);
                if (!clientX) return;
                startX = clientX;
                card.style.transition = 'none';
            };
            const onMove = (e) => {
                if (!isDragging || isAnimating) return;
                e.preventDefault();
                const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : null);
                if (!clientX) return;
                const deltaX = clientX - startX;
                card.style.transform = `translate(${deltaX}px, 0px) rotate(${deltaX * 0.1}deg)`;
                if (deltaX > 50) card.style.boxShadow = '0 0 20px rgba(81,207,102,0.7)';
                else if (deltaX < -50) card.style.boxShadow = '0 0 20px rgba(255,107,107,0.7)';
                else card.style.boxShadow = '0 20px 35px rgba(0,0,0,0.3)';
            };
            const onEnd = (e) => {
                if (!isDragging || isAnimating) return;
                isDragging = false;
                const clientX = e.clientX ?? (e.changedTouches ? e.changedTouches[0].clientX : null);
                if (!clientX) return resetCardPosition(card);
                const deltaX = clientX - startX;
                if (Math.abs(deltaX) > 80) {
                    animateSwipe(card, deltaX > 0 ? 'right' : 'left');
                } else {
                    resetCardPosition(card);
                }
            };
            card.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            card.addEventListener('touchstart', onStart);
            card.addEventListener('touchmove', onMove);
            card.addEventListener('touchend', onEnd);
        }

        function resetCardPosition(card) {
            card.style.transition = 'transform 0.3s';
            card.style.transform = 'translate(0px, 0px) rotate(0deg)';
            card.style.boxShadow = '0 20px 35px rgba(0,0,0,0.3)';
            setTimeout(() => card.style.transition = '', 300);
        }

        function animateSwipe(card, direction) {
            isAnimating = true;
            const deltaX = direction === 'right' ? 500 : -500;
            card.style.transition = 'transform 0.3s ease-out';
            card.style.transform = `translate(${deltaX}px, 80px) rotate(${direction === 'right' ? 25 : -25}deg)`;
            if (direction === 'right') shuffledBouquets[currentIndex].votes++;
            setTimeout(() => {
                card.remove();
                currentIndex++;
                loadNextCard();
                isAnimating = false;
            }, 280);
        }

        function loadNextCard() {
            if (currentIndex >= shuffledBouquets.length) {
                showGlobalResults();
                return;
            }
            const card = createCard(shuffledBouquets[currentIndex]);
            document.getElementById('cardsContainer').appendChild(card);
            currentCard = card;
            attachCardEvents(card);
            updateCounter();
        }

        async function showGlobalResults() {
            // 1. Сохраняем голоса текущего пользователя в "облако" (mock-база через Telegram Bot API)
            const voteData = {
                userId: userId,
                userName: userName,
                votes: shuffledBouquets.map(b => ({ id: b.id, name: b.name, votes: b.votes })),
                winner: shuffledBouquets.reduce((a,b) => a.votes > b.votes ? a : b).name,
                timestamp: Date.now()
            };
            
            // Отправляем данные в ТЕЛЕГРАМ БОТУ (вам нужно создать второго простого бота)
            // Пока сохраняем локально + выводим общую сводку
            await saveVotesToGlobal(voteData);
            
            // 2. Получаем общую статистику по всем пользователям (из localStorage + имитация)
            let globalStats = loadGlobalStats();
            let combinedVotes = {};
            bouquets.forEach(b => combinedVotes[b.name] = 0);
            globalStats.forEach(stat => {
                stat.votes.forEach(v => { combinedVotes[v.name] += v.votes; });
            });
            
            // Сортируем
            let sortedGlobal = Object.entries(combinedVotes).map(([name, votes]) => ({ name, votes })).sort((a,b) => b.votes - a.votes);
            let currentWinner = shuffledBouquets.reduce((a,b) => a.votes > b.votes ? a : b);
            
            // UI: результаты пользователя
            const winnerBlock = document.getElementById('winnerBlock');
            const resultsDiv = document.getElementById('resultsList');
            const globalDiv = document.getElementById('globalStats');
            
            winnerBlock.innerHTML = `
                <span>🏅 ПОБЕДИТЕЛЬ ЭТОГО РАУНДА 🏅</span>
                <h3>✨ ${currentWinner.name} ✨</h3>
                <div style="font-size:20px; margin-top:8px;">${currentWinner.votes} голосов</div>
            `;
            
            let userResultsHtml = `<div style="margin:10px 0 15px 10px; color:#FFD966;">📌 ВАШИ ГОЛОСА:</div>`;
            shuffledBouquets.forEach(b => {
                userResultsHtml += `
                    <div class="result-row ${b.name === currentWinner.name ? 'winner-row' : ''}">
                        <span>${b.name}</span>
                        <span style="background:#00000055; padding:4px 12px; border-radius:20px;">${b.votes} гол.</span>
                    </div>
                `;
            });
            
            let globalHtml = `<div style="font-weight:bold; margin-bottom:8px;">🌍 ОБЩАЯ СТАТИСТИКА (${globalStats.length} участников)</div>`;
            sortedGlobal.slice(0,5).forEach((b, idx) => {
                globalHtml += `<div style="margin:5px 0;">${idx+1}. ${b.name} — ${b.votes} голосов</div>`;
            });
            globalHtml += `<div style="margin-top:12px; font-size:12px;">*Обновляется после каждого голосования</div>`;
            
            resultsDiv.innerHTML = userResultsHtml;
            globalDiv.innerHTML = globalHtml;
            
            document.getElementById('resultsScreen').classList.add('active');
            
            // Отправляем данные админу в Telegram (опционально)
            if (YOUR_TELEGRAM_ID !== "8638747370") {
                tg.sendData(JSON.stringify({ type: "vote_result", user: userName, winner: currentWinner.name, votes: currentWinner.votes }));
            }
        }
        
        // Система хранения общей статистики (LocalStorage + эмуляция бэка)
        function saveVotesToGlobal(data) {
            let all = loadGlobalStats();
            all.push(data);
            localStorage.setItem('bouquet_global_stats', JSON.stringify(all));
            return true;
        }
        
        function loadGlobalStats() {
            let raw = localStorage.getItem('bouquet_global_stats');
            if (!raw) return [];
            try {
                return JSON.parse(raw);
            } catch(e) { return []; }
        }
        
        document.getElementById('leftBtn').onclick = () => { if(currentCard && !isAnimating) animateSwipe(currentCard, 'left'); };
        document.getElementById('rightBtn').onclick = () => { if(currentCard && !isAnimating) animateSwipe(currentCard, 'right'); };
        document.getElementById('restartBtn').onclick = () => location.reload();
        document.getElementById('closeBtn').onclick = () => tg.close();
        
        loadNextCard();
    </script>
</body>
</html>
