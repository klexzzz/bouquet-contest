<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Букетный конкурс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(145deg, #0f0b1e 0%, #1e1733 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .header { position: absolute; top: 0; left: 0; right: 0; padding: 50px 20px 20px; text-align: center; background: linear-gradient(180deg, rgba(15,11,30,0.95) 0%, transparent 100%); z-index: 5; }
        .header h1 { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #FFD966, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 5px; }
        .counter { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); padding: 6px 14px; border-radius: 30px; color: #FFD966; font-weight: 700; font-size: 14px; z-index: 20; }
        .cards-stack { position: relative; width: 310px; height: 460px; margin: 60px auto 20px; }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 45px rgba(0,0,0,0.4); cursor: grab; will-change: transform; background: #fff; }
        .card:active { cursor: grabbing; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); color: white; }
        .card-overlay h3 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 5px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #FFD966; }
        .action-buttons { display: flex; gap: 35px; margin-top: 15px; z-index: 10; }
        .action-btn { width: 72px; height: 72px; border-radius: 50%; border: none; font-size: 36px; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); background: rgba(255,255,255,0.96); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
        .action-btn:active { transform: scale(0.92); }
        .btn-nope { color: #ff6b6b; }
        .btn-like { color: #51cf66; }
        .results-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(145deg, #0f0b1e 0%, #1e1733 100%); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; animation: fadeSlideUp 0.4s ease-out; }
        .results-modal.active { display: flex; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .results-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(24px); border-radius: 48px; padding: 28px 22px; width: 100%; max-width: 360px; border: 1px solid rgba(255,215,0,0.2); }
        .results-card h2 { text-align: center; font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #FFD966, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .winner-gold { background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 50px; padding: 18px; text-align: center; margin-bottom: 24px; color: #2a1a3a; }
        .winner-gold h3 { font-size: 28px; margin-top: 6px; }
        .results-list { max-height: 260px; overflow-y: auto; margin: 16px 0; }
        .result-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.08); margin: 8px 0; padding: 12px 18px; border-radius: 60px; color: white; }
        .result-item.user-winner { background: rgba(255,215,0,0.2); border-left: 4px solid #FFD700; }
        .global-stats { background: rgba(0,0,0,0.45); border-radius: 32px; padding: 14px; margin: 16px 0; text-align: center; font-size: 13px; color: #ddd; }
        .restart-btn { background: #FFD966; border: none; padding: 14px 20px; border-radius: 60px; font-weight: 700; width: 100%; margin-top: 12px; cursor: pointer; color: #2a1a3a; }
        .close-btn { background: rgba(255,255,255,0.15); color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🌸 БУКЕТНЫЙ КОНКУРС</h1>
            <p>Свайп вправо ❤️ — голосуй за букет</p>
        </div>
        <div class="counter" id="counter">0 / 15</div>
        <div class="cards-stack" id="cardsStack"></div>
        <div class="action-buttons">
            <button class="action-btn btn-nope" id="nopeBtn">❌</button>
            <button class="action-btn btn-like" id="likeBtn">❤️</button>
        </div>
    </div>

    <div class="results-modal" id="resultsModal">
        <div class="results-card">
            <h2>🏆 РЕЗУЛЬТАТЫ 🏆</h2>
            <div id="winnerBlock" class="winner-gold"></div>
            <div id="resultsList" class="results-list"></div>
            <div id="globalStats" class="global-stats">📊 Статистика обновляется...</div>
            <button class="restart-btn" id="restartAppBtn">🔁 ПРОЙТИ ЗАНОВО</button>
            <button class="restart-btn close-btn" id="closeAppBtn">✖️ ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const STATS_BOT_TOKEN = "8920323671:AAES9xUjSGgfCqrjbd2bL8Jf0lXffP332KA";
        
        const BOUQUETS = [
            { id: 1, name: "Розовое совершенство", image: "https://i.ibb.co/HLTDRmhV/2dc5d09c-e2b8-450c-b05f-c86cc1bb0136.jpg", votes: 0 },
            { id: 2, name: "Лавандовый сон", image: "https://i.ibb.co/ccwBj5qv/4c7ae421-7d41-4879-9fdf-2a5a1cfc1196.jpg", votes: 0 },
            { id: 3, name: "Солнечный свет", image: "https://i.ibb.co/zTZCY8mT/55fa197f-89ca-4552-aa6f-32f3a5b39eea.jpg", votes: 0 },
            { id: 4, name: "Бархатный вечер", image: "https://i.ibb.co/jPL3TDr8/4519e87c-707a-4452-ba20-1789f8b85614.jpg", votes: 0 },
            { id: 5, name: "Нежный шёпот", image: "https://i.ibb.co/wF2KVkbF/6132869b-20f7-402b-88c9-4f7074eae2d4.jpg", votes: 0 },
            { id: 6, name: "Королевский букет", image: "https://i.ibb.co/27HFvjTC/bce82e6b-b8fe-45da-a98c-cc6178fc1623.jpg", votes: 0 },
            { id: 7, name: "Весенняя свежесть", image: "https://i.ibb.co/v6QJ6kxv/bee98276-4fd2-419b-9c28-eb080f02d140.jpg", votes: 0 },
            { id: 8, name: "Романтика", image: "https://i.ibb.co/G33g8ZJ4/c6d4fddb-baff-4102-8c62-f37bc983a6dc.jpg", votes: 0 },
            { id: 9, name: "Яркая фантазия", image: "https://i.ibb.co/B5rTdGnP/cbba81b1-1727-45a0-a7f2-108155b696dd.jpg", votes: 0 },
            { id: 10, name: "Жемчужный", image: "https://i.ibb.co/QFmT1QVZ/d2c053ed-3814-4125-9d3c-034b330a58f9.jpg", votes: 0 },
            { id: 11, name: "Магия цветов", image: "https://i.ibb.co/5WDs3SdY/e76f095c-ac47-4d12-8f29-e495cff6e8d4.jpg", votes: 0 },
            { id: 12, name: "Изумрудный", image: "https://i.ibb.co/Sw38zVqM/ecc9b085-2fb0-4449-af33-b741129f6f7f.jpg", votes: 0 },
            { id: 13, name: "Перламутровый", image: "https://i.ibb.co/3mVW0JVB/f4b16846-ddd0-4a5a-8340-dbd8dc7ca036.jpg", votes: 0 },
            { id: 14, name: "Сияние", image: "https://i.ibb.co/wr25z3Lp/f9a860fb-8f79-458c-8666-e43f90b79301.jpg", votes: 0 },
            { id: 15, name: "Вдохновение", image: "https://i.ibb.co/MDN4z59r/f89a9882-d917-4c31-b9c7-d40272a1b833.jpg", votes: 0 }
        ];

        let shuffled = [...BOUQUETS].sort(() => Math.random() - 0.5);
        let currentIndex = 0;
        let isAnimating = false;
        let currentCard = null;

        // ОТПРАВКА ДАННЫХ В БОТА №2
        async function sendVotesToBot() {
            const winner = shuffled.reduce((a, b) => a.votes > b.votes ? a : b);
            const votesData = shuffled.map(b => ({ name: b.name, votes: b.votes }));
            
            const payload = {
                winner: winner.name,
                votes: votesData,
                user_id: tg.initDataUnsafe?.user?.id || "anon",
                username: tg.initDataUnsafe?.user?.username || "Гость"
            };
            
            const url = `https://api.telegram.org/bot${STATS_BOT_TOKEN}/sendMessage`;
            
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: tg.initDataUnsafe?.user?.id,
                        text: JSON.stringify(payload)
                    })
                });
                console.log("✅ Голоса отправлены боту");
            } catch(e) {
                console.log("❌ Ошибка:", e);
            }
        }

        async function showResults() {
            const winner = shuffled.reduce((a, b) => a.votes > b.votes ? a : b);
            
            // Отправляем голоса боту
            await sendVotesToBot();
            
            // Показываем личные результаты
            document.getElementById("winnerBlock").innerHTML = `
                <span>🏆 ВАШ ПОБЕДИТЕЛЬ 🏆</span>
                <h3>✨ ${winner.name} ✨</h3>
                <div style="font-size:20px;">${winner.votes} голосов</div>
            `;
            
            let resultsHtml = `<div style="margin-bottom:12px;">📋 ВАШИ ГОЛОСА:</div>`;
            shuffled.forEach(b => {
                resultsHtml += `<div class="result-item"><span>${b.name}</span><span>${b.votes} гол.</span></div>`;
            });
            document.getElementById("resultsList").innerHTML = resultsHtml;
            document.getElementById("resultsModal").classList.add("active");
        }

        // ЛОГИКА СВАЙПОВ
        function createCard(flower) {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${flower.image}" onerror="this.src='https://via.placeholder.com/400x500/ccc?text=Фото'">
                <div class="badge">#${flower.id}</div>
                <div class="card-overlay">
                    <h3>${flower.name}</h3>
                    <p>👆 Свайпни вправо, чтобы проголосовать</p>
                </div>
            `;
            return card;
        }

        function attachDragEvents(card) {
            let startX = 0, isDragging = false;
            const onStart = (e) => {
                if (isAnimating) return;
                isDragging = true;
                startX = e.clientX ?? e.touches[0].clientX;
                card.style.transition = "none";
            };
            const onMove = (e) => {
                if (!isDragging || isAnimating) return;
                e.preventDefault();
                const dx = (e.clientX ?? e.touches[0].clientX) - startX;
                card.style.transform = `translate(${dx}px, 0px) rotate(${dx * 0.1}deg)`;
            };
            const onEnd = (e) => {
                if (!isDragging || isAnimating) return;
                isDragging = false;
                const dx = (e.clientX ?? e.changedTouches[0].clientX) - startX;
                if (Math.abs(dx) > 80) {
                    finishSwipe(card, dx > 0 ? "right" : "left");
                } else {
                    card.style.transition = "transform 0.25s";
                    card.style.transform = "translate(0,0) rotate(0)";
                    setTimeout(() => card.style.transition = "", 250);
                }
            };
            card.addEventListener("mousedown", onStart);
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onEnd);
            card.addEventListener("touchstart", onStart);
            window.addEventListener("touchmove", onMove);
            window.addEventListener("touchend", onEnd);
        }

        function finishSwipe(card, direction) {
            isAnimating = true;
            const targetX = direction === "right" ? 550 : -550;
            card.style.transition = "transform 0.3s cubic-bezier(0.3, 0.9, 0.5, 1.1)";
            card.style.transform = `translate(${targetX}px, 120px) rotate(${direction === "right" ? 25 : -25}deg)`;
            if (direction === "right") shuffled[currentIndex].votes++;
            setTimeout(() => {
                card.remove();
                currentIndex++;
                if (currentIndex >= shuffled.length) showResults();
                else loadNextCard();
                isAnimating = false;
            }, 280);
        }

        function loadNextCard() {
            const card = createCard(shuffled[currentIndex]);
            document.getElementById("cardsStack").appendChild(card);
            currentCard = card;
            attachDragEvents(card);
            document.getElementById("counter").innerHTML = `${currentIndex + 1} / ${shuffled.length}`;
        }

        document.getElementById("likeBtn").onclick = () => { if(currentCard && !isAnimating) finishSwipe(currentCard, "right"); };
        document.getElementById("nopeBtn").onclick = () => { if(currentCard && !isAnimating) finishSwipe(currentCard, "left"); };
        document.getElementById("restartAppBtn").onclick = () => location.reload();
        document.getElementById("closeAppBtn").onclick = () => tg.close();

        loadNextCard();
    </script>
</body>
</html>
